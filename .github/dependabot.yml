version: 2

updates:
  # npm packages — weekly Monday morning. Group patches together so we don't
  # drown in trivial PRs; surface security ones immediately.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Stockholm"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      patch-updates:
        update-types: ["patch"]
      minor-updates:
        update-types: ["minor"]
    ignore:
      # ESLint major bumps must be coordinated with eslint-config-next
      # (Next.js's peer-dep range tends to lag by a major version).
      # Auto-merging eslint major broke Vercel build on 2026-04-26.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      # Same for typescript-eslint family — they peer-depend on eslint
      # range and must move in sync with it.
      - dependency-name: "@typescript-eslint/*"
        update-types: ["version-update:semver-major"]
      # tailwindcss v4 has breaking config changes; pin to v3 majors only.
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      # firecrawl-js v4 is 3 majors past our pinned v1 — needs coordinated
      # migration of lib/scan/firecrawl.ts against the new SDK API.
      # Closed PR #7 for this reason on 2026-04-26.
      - dependency-name: "@mendable/firecrawl-js"
        update-types: ["version-update:semver-major"]
      # Next.js majors require migration of app router patterns + middleware
      # APIs. Keep manual.
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      # React 20+ will land with new compiler defaults — keep manual.
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]

  # GitHub Actions — same cadence
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Stockholm"
    commit-message:
      prefix: "ci"
